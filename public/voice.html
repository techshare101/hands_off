<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HandOff Voice Input</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #a855f7;
    }
    .status {
      font-size: 14px;
      color: #888;
      margin-bottom: 30px;
    }
    .mic-button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
    }
    .mic-button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(168, 85, 247, 0.6);
    }
    .mic-button.listening {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      animation: pulse 1.5s infinite;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.6);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .mic-button svg {
      width: 48px;
      height: 48px;
      fill: white;
    }
    .transcript {
      background: #2a2a4a;
      border-radius: 12px;
      padding: 20px;
      min-height: 80px;
      margin-bottom: 20px;
      font-size: 16px;
      line-height: 1.5;
    }
    .transcript.empty {
      color: #666;
      font-style: italic;
    }
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .send-btn {
      background: #a855f7;
      color: white;
    }
    .send-btn:hover {
      background: #9333ea;
    }
    .send-btn:disabled {
      background: #444;
      cursor: not-allowed;
    }
    .cancel-btn {
      background: #333;
      color: #888;
    }
    .cancel-btn:hover {
      background: #444;
      color: white;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 Voice Input</h1>
    <p class="status" id="status">Click the mic to start speaking</p>
    
    <button class="mic-button" id="micBtn">
      <svg viewBox="0 0 24 24" id="micIcon">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V19h4v2H8v-2h4v-3.07z"/>
      </svg>
    </button>
    
    <div class="transcript empty" id="transcript">Your speech will appear here...</div>
    
    <div class="buttons">
      <button class="cancel-btn" id="cancelBtn">Cancel</button>
      <button class="send-btn" id="sendBtn" disabled>Send to HandOff</button>
    </div>
    
    <p class="hint">Tip: Speak clearly and pause when done</p>
  </div>

  <script src="voice.js"></script>
</body>
</html>
